    <!-- Social Sign-in Error Handling -->
    <script>
      (function checkAuthState() {
        const errorState = 'error_description';
        const urlParams = new URLSearchParams(window.location.search);
        const altReg = 'Blocked. User must complete alternate registration route.';

        if (urlParams.has(errorState)) {
          const preSignUpError = 'PreSignUp failed with error ';
          const errorMsg = urlParams.get(errorState);

          if (new RegExp(preSignUpError).test(errorMsg)) {
            const formattedMsg = errorMsg.replace(preSignUpError, '');

            if (formattedMsg.includes(altReg)) {
              const em = errorMsg.split('|')[1];
              const baseUrl = `${window.location.protocol}//${window.location.host}`;
              const sp = new URLSearchParams();
              sp.set('email', em);

              window.location.assign(`${baseUrl}/#/login/external?${sp.toString()}`);
            }
          }
        }
      })();
    </script>
